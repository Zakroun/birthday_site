<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday — Surprise 🎉</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2216%22>🎉</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4da6;
            --secondary: #ff8fb1;
            --dark: #2b2b2b;
            --light: #fff;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="2" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: 50px 50px;
            animation: float 20s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100px); }
        }

        /* Flower Background Animation */
        .flower {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            animation: floatFlower linear infinite;
            opacity: 0.7;
        }

        @keyframes floatFlower {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .flower::before {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #ff69b4 30%, #ff1493 70%);
            border-radius: 50% 50% 0 50%;
            transform: rotate(45deg);
            position: relative;
        }

        .flower::after {
            content: '';
            display: block;
            width: 10px;
            height: 30px;
            background: linear-gradient(180deg, #90EE90, #228B22);
            position: absolute;
            bottom: -25px;
            left: 15px;
            border-radius: 5px;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            background: var(--glass);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            animation: fadeInScale 0.8s ease-out;
            z-index: 10;
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 1s ease-out 0.3s both;
        }

        @keyframes slideDown {
            0% {
                opacity: 0;
                transform: translateY(-30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 77, 166, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(255, 77, 166, 0.8)); }
        }

        .subtitle {
            color: #555;
            font-size: 18px;
            font-weight: 300;
        }

        .countdown-wrapper {
            animation: fadeIn 1s ease-out 0.6s both;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .time-box {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.85));
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: popIn 0.6s ease-out backwards;
        }

        .time-box:nth-child(1) { animation-delay: 0.8s; }
        .time-box:nth-child(2) { animation-delay: 1s; }
        .time-box:nth-child(3) { animation-delay: 1.2s; }
        .time-box:nth-child(4) { animation-delay: 1.4s; }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.5) rotateZ(10deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateZ(0deg);
            }
        }

        .time-box:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 77, 166, 0.3);
        }

        .time-number {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .time-label {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .btn-container {
            text-align: center;
            margin: 40px 0;
            animation: fadeIn 1s ease-out 1.6s both;
        }

        .surprise-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 20px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 77, 166, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .surprise-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .surprise-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .surprise-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 77, 166, 0.6);
        }

        .surprise-btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        .surprise-btn span {
            position: relative;
            z-index: 1;
        }

        .card-container {
            margin-top: 40px;
        }

        .surprise-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(255, 240, 245, 0.95));
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: scale(0.8) rotateX(20deg);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .surprise-card.show {
            opacity: 1;
            transform: scale(1) rotateX(0deg);
        }

        .card-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .card-image {
            min-height: 500px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .card-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 77, 166, 0.2), rgba(255, 143, 177, 0.2));
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .card-text {
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-text h2 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        .card-text p {
            color: #555;
            line-height: 1.8;
            font-size: 16px;
            font-weight: 400;
        }

        /* Hearts Animation */
        .heart {
            position: fixed;
            bottom: -50px;
            font-size: 30px;
            color: #ff1744;
            animation: floatUp 4s ease-in-out forwards;
            pointer-events: none;
            z-index: 9999;
            filter: drop-shadow(0 0 10px rgba(255, 23, 68, 0.6));
        }

        @keyframes floatUp {
            0% {
                bottom: -50px;
                opacity: 1;
                transform: translateX(0) rotate(0deg);
            }
            50% {
                opacity: 1;
            }
            100% {
                bottom: 110vh;
                opacity: 0;
                transform: translateX(var(--drift)) rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 32px;
            }

            .countdown {
                grid-template-columns: repeat(2, 1fr);
            }

            .card-content {
                grid-template-columns: 1fr;
            }

            .card-image {
                min-height: 300px;
            }

            .card-text {
                padding: 30px;
            }

            .card-text h2 {
                font-size: 28px;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Happy Birthday my loveeeee 🎉🎂</h1>
            <p class="subtitle">Special day — 30 May 2026</p>
        </header>

        <div class="countdown-wrapper" id="countdownWrapper">
            <div class="countdown">
                <div class="time-box">
                    <div class="time-number" id="days">--</div>
                    <div class="time-label">Days</div>
                </div>
                <div class="time-box">
                    <div class="time-number" id="hours">--</div>
                    <div class="time-label">Hours</div>
                </div>
                <div class="time-box">
                    <div class="time-number" id="minutes">--</div>
                    <div class="time-label">Minutes</div>
                </div>
                <div class="time-box">
                    <div class="time-number" id="seconds">--</div>
                    <div class="time-label">Seconds</div>
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button class="surprise-btn" id="surpriseBtn">
                <span>✨ Show Surprise ✨</span>
            </button>
        </div>

        <div class="card-container" id="cardContainer"></div>
    </div>

    <audio id="birthdayAudio" src="birthday.mp3"></audio>

    <script>
        // Countdown Timer
        const targetDate = new Date("2026-05-30T00:00:00").getTime();
        const surpriseBtn = document.getElementById('surpriseBtn');
        const countdownWrapper = document.getElementById('countdownWrapper');
        const cardContainer = document.getElementById('cardContainer');
        const audio = document.getElementById('birthdayAudio');

        function updateCountdown() {
            const now = Date.now();
            let diff = targetDate - now;

            if (diff <= 0) {
                diff = 0;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();

        // Create Floating Flowers in Background
        function createFlower() {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.fontSize = (Math.random() * 20 + 30) + 'px';
            flower.style.animationDuration = (Math.random() * 10 + 15) + 's';
            flower.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(flower);

            setTimeout(() => {
                flower.remove();
            }, 25000);
        }

        // Create initial flowers
        for (let i = 0; i < 15; i++) {
            setTimeout(() => createFlower(), i * 1000);
        }

        // Continuously create flowers
        setInterval(() => {
            createFlower();
        }, 2000);

        // Create Hearts Animation
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.setProperty('--drift', (Math.random() - 0.5) * 200 + 'px');
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        function createHeartsAnimation() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    createHeart();
                }, i * 100);
            }
        }

        // Surprise Button Click Event
        surpriseBtn.addEventListener('click', () => {
            surpriseBtn.classList.add('hidden');
            countdownWrapper.classList.add('hidden');

            const card = document.createElement('div');
            card.className = 'surprise-card';
            card.innerHTML = `
                <div class="card-content">
                    <div class="card-image" style="background-image: url('Us.png');"></div>
                    <div class="card-text">
                        <h2>Happy Birthday ❤️</h2>
                        <p>
                            Happy Birthday, my dearest Ichrak! ❤️<br><br>
                            From the moment you entered my life, everything has changed for the better. You've filled my days with joy, my heart with love, and my life with meaning I never knew before. Every smile, every laugh, every glance from you feels like magic, and I find myself falling for you more deeply with each passing day. Being with you has made me happier than I ever thought possible, and I cherish every single moment we share together.<br><br>
                            I dream of a future where we grow old side by side, creating memories, facing challenges, and celebrating victories together. I hope one day you'll be my wife, because my heart belongs to you completely, and I want to spend the rest of my life loving you, protecting you, and making you smile every single day.<br><br>
                            You are my everything, my joy, my love, and my life's greatest blessing. On your special day, I wish you endless happiness, love beyond measure, and a year filled with dreams coming true. kanbghikkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkkk Muahhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhhh! 💋💋💋💋💋💋
                        </p>
                    </div>
                </div>
            `;

            cardContainer.appendChild(card);

            setTimeout(() => {
                card.classList.add('show');
                createHeartsAnimation();
                
                setInterval(() => {
                    createHeart();
                }, 300);
            }, 100);

            audio.currentTime = 0;
            audio.play().catch(e => console.log('Audio autoplay prevented'));
        });
    </script>
</body>
</html>
